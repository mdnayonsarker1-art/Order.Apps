<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e1b4b">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/192/pill.png">
    <title>Sharif Pharma - Digital Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .app-page { display: none; }
        .app-page.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-header { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); border-radius: 0 0 32px 32px; padding: 40px 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .setup-card { background: white; border-radius: 28px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; }
        .large-input { width: 100%; padding: 18px; border: 2px solid #eef2f6; border-radius: 20px; margin-bottom: 12px; outline: none; font-size: 16px; font-weight: 600; background: #f8fafc; }
        .save-btn { width: 100%; padding: 18px; border-radius: 20px; color: white; font-weight: 900; text-transform: uppercase; font-size: 14px; cursor: pointer; border: none; transition: 0.2s; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .hidden-section { display: none; }
        .scrollable-list { max-height: 250px; overflow-y: auto; }
        .toggle-btn { display: inline-flex; align-items: center; gap: 4px; color: #94a3b8; font-size: 10px; font-weight: 900; margin-top: 10px; text-transform: uppercase; cursor: pointer; }
        .order-table { width: 100%; border-collapse: collapse; }
        .order-table th { background: #f8fafc; color: #64748b; font-size: 11px; text-transform: uppercase; padding: 12px; text-align: left; }
        .order-table td { padding: 12px; font-size: 14px; border-bottom: 1px solid #f1f5f9; font-weight: 600; }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto pb-24">
        <div id="home-section" class="app-page active">
            <div class="glass-header mb-8 text-center relative">
                <button onclick="window.showPage('settings-section')" class="absolute top-6 right-6 bg-white/10 backdrop-blur-md p-3 rounded-2xl text-white"><i class="fa-solid fa-sliders"></i></button>
                <h1 class="text-3xl font-black text-white uppercase italic mb-1">SHARIF PHARMA</h1>
                <p class="text-indigo-200 text-[10px] font-bold tracking-widest uppercase opacity-80">Inventory Manager</p>
            </div>
            <div class="px-6">
                <div id="main-group-list" class="grid grid-cols-2 gap-4 mb-8"></div>
                <button onclick="window.showPage('history-section')" class="w-full bg-slate-900 text-white p-6 rounded-[2.5rem] flex items-center justify-between shadow-2xl">
                    <div class="flex items-center gap-4">
                        <div class="bg-indigo-500 p-3 rounded-2xl"><i class="fa-solid fa-file-invoice text-xl"></i></div>
                        <p class="font-black text-lg italic">অর্ডার রিপোর্ট</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-500"></i>
                </button>
            </div>
        </div>

        <div id="settings-section" class="app-page px-6 pt-8">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="window.showPage('home-section')" class="bg-white p-3 rounded-2xl shadow-sm border text-indigo-900"><i class="fa-solid fa-arrow-left"></i></button>
                <h1 class="text-2xl font-black text-slate-800 uppercase italic">Settings</h1>
            </div>
            <div class="setup-card">
                <div class="card-accent bg-indigo-600"></div>
                <h3 class="text-[10px] font-black text-indigo-600 uppercase mb-4 tracking-widest">GROUPS</h3>
                <div class="flex gap-2">
                    <input type="text" id="gInput" placeholder="Ex: GB-1" class="!mb-0 !p-3 rounded-xl border-2 flex-1">
                    <button id="addGroupBtn" class="bg-indigo-950 text-white px-5 rounded-xl font-black text-xs">ADD</button>
                </div>
                <div id="gList" class="flex flex-wrap gap-2 mt-4"></div>
            </div>
            <div class="setup-card">
                <div class="card-accent bg-emerald-500"></div>
                <h3 class="text-[10px] font-black text-emerald-600 uppercase mb-4 tracking-widest">CUSTOMERS</h3>
                <select id="cGroupSelect" class="large-input !text-sm"><option value="">Select Group First</option></select>
                <textarea id="cInputBulk" rows="2" placeholder="কাস্টমারের নাম..." class="large-input !text-sm"></textarea>
                <button id="saveCustBtn" class="save-btn bg-emerald-600">SAVE</button>
                <div onclick="window.toggleSection('cViewWrap')" class="toggle-btn mt-4">SHOW & DELETE <i class="fa-solid fa-chevron-down"></i></div>
                <div id="cViewWrap" class="hidden-section mt-4">
                    <div id="cSettingsGroupButtons" class="flex flex-wrap gap-2 mb-4"></div>
                    <div id="cSettingsListUI" class="space-y-2 border-t pt-4 scrollable-list"></div>
                </div>
            </div>
            <div class="setup-card">
                <div class="card-accent bg-orange-500"></div>
                <h3 class="text-[10px] font-black text-orange-600 uppercase mb-4 tracking-widest">MEDICINE</h3>
                <textarea id="mInputBulk" rows="2" placeholder="মেডিসিন লিস্ট..." class="large-input !text-sm"></textarea>
                <button id="saveMedBtn" class="save-btn bg-orange-600">SAVE</button>
                <div id="mListUI" class="flex flex-wrap gap-2 mt-4"></div>
            </div>
        </div>

        <div id="history-section" class="app-page px-6 pt-8">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="window.showPage('home-section')" class="bg-white p-3 rounded-2xl shadow-sm border text-indigo-600"><i class="fa-solid fa-chevron-left"></i></button>
                <h1 class="text-2xl font-black text-slate-800 uppercase italic">History</h1>
            </div>
            <div class="setup-card !p-4 bg-indigo-50/50 border-none">
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="date" id="fromDate" class="large-input !p-3 !text-xs !mb-0">
                    <input type="date" id="toDate" class="large-input !p-3 !text-xs !mb-0">
                </div>
                <select id="searchGroupFilter" class="large-input !text-sm !mb-2 !p-4"></select>
                <button id="searchHistoryBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg uppercase text-xs">সার্চ রিপোর্ট</button>
            </div>
            <div id="history-data" class="space-y-4"></div>
        </div>

        <div id="detail-section" class="app-page px-6 pt-8">
            <div class="flex justify-between items-center mb-6">
                <button onclick="window.showPage('history-section')" class="bg-white p-3 rounded-2xl shadow-sm border text-indigo-900"><i class="fa-solid fa-arrow-left"></i></button>
                <button id="downloadPdfBtn" class="bg-emerald-600 text-white px-6 py-4 rounded-2xl text-sm font-black uppercase shadow-lg"><i class="fa-solid fa-file-pdf mr-2"></i> PDF</button>
            </div>
            <div id="invoice-print" class="bg-white p-6 rounded-[2.5rem] border shadow-xl mb-6">
                <div class="text-center border-b pb-4 mb-4">
                    <h2 class="text-2xl font-black italic text-indigo-700">SHARIF PHARMA</h2>
                    <p id="inv-date" class="text-[9px] font-bold text-slate-400 uppercase mt-1"></p>
                </div>
                <p id="inv-chemist" class="text-xl font-black uppercase text-slate-800 italic mb-4"></p>
                <table class="order-table">
                    <thead><tr><th>Medicine</th><th class="text-center">Qty</th><th class="no-pdf text-center">X</th></tr></thead>
                    <tbody id="inv-items-table-body"></tbody>
                </table>
            </div>
            <div class="setup-card border-l-8 border-orange-500">
                <h3 class="text-[10px] font-black text-orange-600 uppercase mb-4 tracking-widest">Update Order Items</h3>
                <input type="text" id="edit-p-name" list="med-list-data" placeholder="মেডিসিনের নাম..." class="large-input !text-sm">
                <input type="number" id="edit-p-qty" placeholder="পরিমাণ" class="large-input !text-sm">
                <button id="addItemToExistingBtn" class="save-btn bg-orange-500 font-black text-xs uppercase">আইটেম আপডেট করুন</button>
            </div>
        </div>

        <div id="chemist-section" class="app-page px-6 pt-8">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="window.showPage('home-section')" class="bg-white p-3 rounded-2xl shadow-sm border text-indigo-900"><i class="fa-solid fa-chevron-left"></i></button>
                <h1 id="group-title" class="text-xl font-black text-slate-800 uppercase italic">Chemist</h1>
            </div>
            <input type="text" id="custSearch" placeholder="সার্চ করুন..." class="large-input !text-sm shadow-sm">
            <div id="chemist-list" class="space-y-3"></div>
        </div>

        <div id="form-section" class="app-page px-6 pt-8">
            <button onclick="window.showPage('chemist-section')" class="font-bold text-indigo-600 mb-6 flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-sm w-fit"><i class="fa-solid fa-arrow-left"></i> ব্যাক</button>
            <div class="setup-card border-t-8 border-indigo-600">
                <h2 id="selected-chemist-name" class="text-2xl font-black text-slate-800 uppercase italic mb-6 text-center"></h2>
                <input type="text" id="product-name" list="med-list-data" placeholder="মেডিসিনের নাম..." class="large-input">
                <input type="number" id="quantity" placeholder="পরিমাণ" class="large-input">
                <button id="addToCartBtn" class="save-btn bg-indigo-600">অ্যাড করুন</button>
            </div>
            <div class="setup-card p-0 overflow-hidden"><table class="w-full"><tbody id="cart-items" class="divide-y divide-slate-100"></tbody></table></div>
            <button id="saveOrderBtn" class="w-full mt-4 bg-emerald-600 text-white py-6 rounded-3xl font-black text-xl shadow-2xl uppercase">অর্ডার সেভ করুন</button>
        </div>
    </div>

    <datalist id="med-list-data"></datalist>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, collection, addDoc, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAzwqWUuMyW8piPhkFRhcpnmcpbu_0-lvk",
            authDomain: "sharif-pharma.firebaseapp.com",
            projectId: "sharif-pharma",
            storageBucket: "sharif-pharma.firebasestorage.app",
            messagingSenderId: "867521349666",
            appId: "1:867521349666:web:a8d139d5c41690e910227b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const DOC_REF = doc(db, "settings", "app_data");

        let masterData = { groups: [], customers: [], medicines: [] }, cart = [], currentGroup = '', currentChemist = '', currentOrderId = '', currentOrderData = null;

        window.showPage = (id) => { 
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            window.scrollTo(0,0);
        };
        window.toggleSection = (id) => document.getElementById(id).classList.toggle('hidden-section');

        onSnapshot(DOC_REF, (snap) => {
            masterData = snap.exists() ? snap.data() : { groups: [], customers: [], medicines: [] };
            renderUI();
        });

        function renderUI() {
            document.getElementById('main-group-list').innerHTML = (masterData.groups || []).map(g => `
                <button onclick="window.showChemists('${g}')" class="bg-white p-6 rounded-[2rem] border shadow-sm text-center">
                    <i class="fa-solid fa-folder text-indigo-500 text-3xl mb-3"></i>
                    <div class="font-black text-slate-700 text-[11px] uppercase">${g}</div>
                </button>
            `).join('');
            document.getElementById('gList').innerHTML = (masterData.groups || []).map(g => `<span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">${g} <i onclick="window.removeItem('groups', '${g}')" class="fa-solid fa-xmark ml-1 cursor-pointer"></i></span>`).join('');
            document.getElementById('cGroupSelect').innerHTML = '<option value="">Select Group</option>' + (masterData.groups || []).map(g => `<option value="${g}">${g}</option>`).join('');
            document.getElementById('searchGroupFilter').innerHTML = '<option value="ALL">All Groups</option>' + (masterData.groups || []).map(g => `<option value="${g}">${g}</option>`).join('');
            document.getElementById('cSettingsGroupButtons').innerHTML = (masterData.groups || []).map(g => `<button onclick="window.viewCustomersByGroup('${g}')" class="bg-slate-100 text-slate-500 px-3 py-2 rounded-xl text-[10px] font-black uppercase">${g}</button>`).join('');
            document.getElementById('mListUI').innerHTML = (masterData.medicines || []).map(m => `<span class="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">${m} <i onclick="window.removeItem('medicines', '${m}')" class="fa-solid fa-xmark ml-1 cursor-pointer"></i></span>`).join('');
            document.getElementById('med-list-data').innerHTML = (masterData.medicines || []).map(m => `<option value="${m}">`).join('');
        }

        window.viewCustomersByGroup = (g) => {
            const filtered = (masterData.customers || []).filter(c => c.group === g);
            document.getElementById('cSettingsListUI').innerHTML = filtered.map(c => `<div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border mb-1"><span>${c.name}</span><i onclick="window.removeCustMaster('${c.name}', '${c.group}')" class="fa-solid fa-trash text-red-400 p-1 cursor-pointer"></i></div>`).join('');
        };

        window.removeCustMaster = async (n, g) => { if(confirm("Delete?")) await updateDoc(DOC_REF, { customers: (masterData.customers || []).filter(c => !(c.name === n && c.group === g)) }); };

        // History Search
        document.getElementById('searchHistoryBtn').onclick = async () => {
            const from = document.getElementById('fromDate').value, to = document.getElementById('toDate').value, grp = document.getElementById('searchGroupFilter').value;
            if(!from || !to) return alert("Select Date");
            const container = document.getElementById('history-data'); container.innerHTML = '<p class="text-center font-bold py-10">Searching...</p>';
            const q = query(collection(db, "orders"), where("date", ">=", from), where("date", "<=", to));
            const snap = await getDocs(q);
            let results = []; snap.forEach(d => { if(grp === "ALL" || d.data().group === grp) results.push({id: d.id, ...d.data()}); });
            results.sort((a,b) => b.timestamp - a.timestamp);
            container.innerHTML = results.map(d => `
                <div class="setup-card flex justify-between items-center !p-4 border-l-8 border-indigo-600">
                    <div onclick="window.openDetail('${d.id}')" class="flex-1">
                        <p class="font-black text-slate-800 uppercase italic">${d.chemist}</p>
                        <p class="text-[9px] font-bold text-slate-400 uppercase">${d.group} • ${d.date}</p>
                    </div>
                    <button onclick="window.deleteReport('${d.id}')" class="p-3 text-red-400"><i class="fa-solid fa-trash-can"></i></button>
                </div>`).join('');
        };

        window.deleteReport = async (id) => { if(confirm("Delete Report?")) { await deleteDoc(doc(db, "orders", id)); document.getElementById('searchHistoryBtn').click(); } };

        // Detail View with REAL-TIME EDIT
        window.openDetail = (id) => {
            currentOrderId = id;
            onSnapshot(doc(db, "orders", id), (snap) => {
                if(!snap.exists()) return;
                currentOrderData = snap.data();
                document.getElementById('inv-date').innerText = currentOrderData.date;
                document.getElementById('inv-chemist').innerText = currentOrderData.chemist;
                document.getElementById('inv-items-table-body').innerHTML = (currentOrderData.items || []).map((it, i) => `
                    <tr>
                        <td class="uppercase text-[12px]">${it.product}</td>
                        <td class="text-center font-black text-indigo-600">x${it.qty}</td>
                        <td class="no-pdf text-center"><button onclick="window.deleteItemFromOrder(${i})" class="text-red-300"><i class="fa-solid fa-trash-can"></i></button></td>
                    </tr>`).join('');
                window.showPage('detail-section');
            });
        };

        window.deleteItemFromOrder = async (i) => {
            if(confirm("Delete this item?")) {
                const newItems = currentOrderData.items.filter((_, idx) => idx !== i);
                await updateDoc(doc(db, "orders", currentOrderId), { items: newItems });
            }
        };

        document.getElementById('addItemToExistingBtn').onclick = async () => {
            const p = document.getElementById('edit-p-name').value.toUpperCase();
            const q = document.getElementById('edit-p-qty').value;
            if(p && q) {
                await updateDoc(doc(db, "orders", currentOrderId), { items: arrayUnion({ product: p, qty: q }) });
                document.getElementById('edit-p-name').value = ''; document.getElementById('edit-p-qty').value = '';
            }
        };

        // Order Form Logic
        window.showChemists = (g) => {
            currentGroup = g; document.getElementById('group-title').innerText = g; window.showPage('chemist-section');
            const filtered = (masterData.customers || []).filter(c => c.group === g);
            const render = (list) => { document.getElementById('chemist-list').innerHTML = list.map(c => `<button onclick="window.openForm('${c.name}')" class="w-full text-left p-6 bg-white border rounded-[2rem] font-black text-slate-700 shadow-sm uppercase italic">${c.name}</button>`).join(''); };
            render(filtered);
            document.getElementById('custSearch').oninput = (e) => render(filtered.filter(c => c.name.includes(e.target.value.toUpperCase())));
        };

        window.openForm = (name) => { currentChemist = name; cart = []; renderCart(); document.getElementById('selected-chemist-name').innerText = name; window.showPage('form-section'); };
        document.getElementById('addToCartBtn').onclick = () => {
            const p = document.getElementById('product-name').value.toUpperCase(), q = document.getElementById('quantity').value;
            if(p && q) { cart.push({product: p, qty: q}); document.getElementById('product-name').value = ''; document.getElementById('quantity').value = ''; renderCart(); document.getElementById('product-name').focus(); }
        };
        function renderCart() { document.getElementById('cart-items').innerHTML = cart.map((item, i) => `<tr class="flex justify-between items-center p-5"><td class="font-bold uppercase">${item.product}</td><td class="font-black text-indigo-600">x${item.qty}</td><td><button onclick="window.removeCartItem(${i})" class="text-red-400">✕</button></td></tr>`).join(''); }
        window.removeCartItem = (i) => { cart.splice(i,1); renderCart(); };
        document.getElementById('saveOrderBtn').onclick = async () => {
            if(!cart.length) return;
            const date = new Intl.DateTimeFormat('en-CA', {timeZone:'Asia/Dhaka'}).format(new Date());
            await addDoc(collection(db, "orders"), { group: currentGroup, chemist: currentChemist, items: cart, date: date, timestamp: new Date().getTime() });
            alert("Saved!"); window.showPage('chemist-section');
        };

        // PDF and Master Data functions
        document.getElementById('downloadPdfBtn').onclick = () => {
            const el = document.getElementById('invoice-print');
            const noPdf = document.querySelectorAll('.no-pdf'); noPdf.forEach(x => x.style.display = 'none');
            html2pdf().set({ margin: 10, filename: `${currentOrderData.chemist}.pdf`, html2canvas: { scale: 3 }, jsPDF: { format: 'a4' } }).from(el).save().then(() => noPdf.forEach(x => x.style.display = 'table-cell'));
        };
        document.getElementById('addGroupBtn').onclick = async () => { const v = document.getElementById('gInput').value.trim().toUpperCase(); if(v) await updateDoc(DOC_REF, { groups: arrayUnion(v) }); document.getElementById('gInput').value = ''; };
        document.getElementById('saveMedBtn').onclick = async () => {
            const meds = document.getElementById('mInputBulk').value.split(/[,\n]/).map(m => m.trim().toUpperCase()).filter(m => m);
            if(meds.length) { await updateDoc(DOC_REF, { medicines: arrayUnion(...meds) }); document.getElementById('mInputBulk').value = ''; }
        };
        document.getElementById('saveCustBtn').onclick = async () => {
            const grp = document.getElementById('cGroupSelect').value, txt = document.getElementById('cInputBulk').value.split(/[,\n]/).map(n => n.trim().toUpperCase()).filter(n => n);
            if(grp && txt.length) { await updateDoc(DOC_REF, { customers: arrayUnion(...txt.map(n => ({name: n, group: grp}))) }); document.getElementById('cInputBulk').value = ''; alert("Saved!"); }
        };
        window.removeItem = async (k, v) => { if(confirm("Delete?")) await updateDoc(DOC_REF, { [k]: arrayRemove(v) }); };

    </script>
</body>
</html>
