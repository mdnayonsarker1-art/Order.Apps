<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="theme-color" content="#1e1b4b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sharif Pharma">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/1e1b4b/ffffff?text=SP">
    
    <link rel="manifest" id="pwa-manifest">

    <title>Sharif Pharma - Digital Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .app-page { display: none; }
        .app-page.active { display: block; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-header { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); border-radius: 0 0 32px 32px; padding: 40px 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .setup-card { background: white; border-radius: 28px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; }

        .large-input { width: 100%; padding: 18px; border: 2px solid #eef2f6; border-radius: 20px; margin-bottom: 12px; outline: none; transition: 0.3s; font-size: 16px; font-weight: 600; background: #f8fafc; }
        .large-input:focus { border-color: #6366f1; background: white; }
        
        .save-btn { width: 100%; padding: 18px; border-radius: 20px; color: white; font-weight: 900; text-transform: uppercase; font-size: 14px; cursor: pointer; border: none; transition: 0.2s; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .save-btn:active { transform: scale(0.96); }
        
        .order-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .order-table th { background: #f8fafc; color: #64748b; font-size: 11px; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 2px solid #f1f5f9; }
        .order-table td { padding: 12px; font-size: 14px; border-bottom: 1px solid #f1f5f9; font-weight: 600; }
        
        .hidden-section { display: none; }
        .scrollable-list { max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .scrollable-list::-webkit-scrollbar { width: 4px; }
        .scrollable-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .toggle-btn { display: inline-flex; align-items: center; gap: 4px; color: #94a3b8; font-size: 10px; font-weight: 900; margin-top: 10px; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto pb-24">
        
        <div id="home-section" class="app-page active">
            <div class="glass-header mb-8 text-center relative">
                <button onclick="window.showPage('settings-section')" class="absolute top-6 right-6 bg-white/10 backdrop-blur-md p-3 rounded-2xl text-white">
                    <i class="fa-solid fa-sliders text-lg"></i>
                </button>
                <h1 class="text-3xl font-black text-white tracking-tighter uppercase italic mb-1">TUE LIST</h1>
                <p class="text-indigo-200 text-[10px] font-bold tracking-[0.3em] uppercase opacity-80">Inventory & Order Manager</p>
            </div>

            <div class="px-6">
                <div id="main-group-list" class="grid grid-cols-2 gap-4 mb-8"></div>
                <button onclick="window.showPage('history-section')" class="w-full bg-slate-900 text-white p-6 rounded-[2.5rem] flex items-center justify-between shadow-2xl active:scale-95 transition-all">
                    <div class="flex items-center gap-4">
                        <div class="bg-indigo-500 p-3 rounded-2xl"><i class="fa-solid fa-file-invoice text-xl"></i></div>
                        <div class="text-left">
                            <p class="font-black text-lg leading-none italic">অর্ডার রিপোর্ট</p>
                            <p class="text-[10px] text-slate-400 uppercase mt-1 tracking-widest">History & PDF Export</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-500"></i>
                </button>
            </div>
        </div>

        <div id="settings-section" class="app-page px-6 pt-8">
            <div class="flex items-center gap-4 mb-8">
                <button onclick="window.showPage('home-section')" class="bg-white p-3 rounded-2xl shadow-sm border text-indigo-900"><i class="fa-solid fa-arrow-left"></i></button>
                <h1 class="text-2xl font-black text-slate-800 uppercase italic">Settings</h1>
            </div>
            <div class="setup-card">
                <div class="card-accent bg-indigo-600"></div>
                <h3 class="text-[10px] font-black text-indigo-600 uppercase mb-4 tracking-widest">STEP 1: GROUPS</h3>
                <div class="flex gap-2">
                    <input type="text" id="gInput" placeholder="Ex: GB-1" class="!mb-0 !p-3 rounded-xl border-2 flex-1">
                    <button id="addGroupBtn" class="bg-indigo-950 text-white px-5 rounded-xl font-black text-xs">ADD</button>
                </div>
                <div onclick="window.toggleSection('gListWrap')" class="toggle-btn">SHOW GROUPS <i class="fa-solid fa-chevron-down"></i></div>
                <div id="gListWrap" class="hidden-section mt-4 scrollable-list"><div id="gList" class="flex flex-wrap gap-2"></div></div>
            </div>

            <div class="setup-card">
                <div class="card-accent bg-emerald-500"></div>
                <h3 class="text-[10px] font-black text-emerald-600 uppercase mb-4 tracking-widest">STEP 2: CUSTOMERS</h3>
                <select id="cGroupSelect" class="large-input !text-sm"><option value="">Select Group First</option></select>
                <textarea id="cInputBulk" rows="2" placeholder="কাস্টমারের নামগুলো লিখুন..." class="large-input !text-sm"></textarea>
                <button id="saveCustBtn" class="save-btn bg-emerald-600">SAVE CUSTOMERS</button>
                <div onclick="window.toggleSection('cViewWrap')" class="toggle-btn mt-4">SHOW CUSTOMERS <i class="fa-solid fa-chevron-down"></i></div>
                <div id="cViewWrap" class="hidden-section mt-4">
                    <div id="cSettingsGroupButtons" class="flex flex-wrap gap-2 mb-4"></div>
                    <div id="cSettingsListUI" class="space-y-2 border-t pt-4 scrollable-list"></div>
                </div>
            </div>

            <div class="setup-card">
                <div class="card-accent bg-orange-500"></div>
                <h3 class="text-[10px] font-black text-orange-600 uppercase mb-4 tracking-widest">STEP 3: MEDICINE</h3>
                <textarea id="mInputBulk" rows="2" placeholder="মেডিসিন লিস্ট..." class="large-input !text-sm"></textarea>
                <button id="saveMedBtn" class="save-btn bg-orange-600">SAVE MEDICINE</button>
                <div onclick="window.toggleSection('mListWrap')" class="toggle-btn mt-4">SHOW MEDICINES <i class="fa-solid fa-chevron-down"></i></div>
                <div id="mListWrap" class="hidden-section mt-4 scrollable-list"><div id="mListUI" class="flex flex-wrap gap-2"></div></div>
            </div>
        </div>

        <div id="chemist-section" class="app-page px-6 pt-8">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="window.showPage('home-section')" class="bg-white p-3 rounded-2xl shadow-sm border text-indigo-900"><i class="fa-solid fa-chevron-left"></i></button>
                <h1 id="group-title" class="text-xl font-black text-slate-800 uppercase italic">Chemist List</h1>
            </div>
            <input type="text" id="custSearch" placeholder="সার্চ করুন..." class="large-input !text-sm shadow-sm">
            <div id="chemist-list" class="space-y-3"></div>
        </div>

        <div id="form-section" class="app-page px-6 pt-8">
            <button onclick="window.showPage('chemist-section')" class="font-bold text-indigo-600 mb-6 flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-sm w-fit"><i class="fa-solid fa-arrow-left"></i> ব্যাক</button>
            <div class="setup-card border-t-8 border-indigo-600">
                <h2 id="selected-chemist-name" class="text-2xl font-black text-slate-800 uppercase italic mb-6 text-center"></h2>
                <input type="text" id="product-name" list="med-list-data" placeholder="মেডিসিনের নাম..." class="large-input">
                <input type="number" id="quantity" placeholder="পরিমাণ (Qty)" class="large-input">
                <button id="addToCartBtn" class="save-btn bg-indigo-600 shadow-xl shadow-indigo-100 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus-circle text-lg"></i> অ্যাড করুন
                </button>
            </div>
            <div class="setup-card p-0 overflow-hidden"><table class="w-full"><tbody id="cart-items" class="divide-y divide-slate-100"></tbody></table></div>
            <button id="saveOrderBtn" class="w-full mt-4 bg-emerald-600 text-white py-6 rounded-3xl font-black text-xl shadow-2xl uppercase italic">অর্ডার সেভ করুন</button>
        </div>

        <div id="history-section" class="app-page px-6 pt-8">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="window.showPage('home-section')" class="bg-white p-3 rounded-2xl shadow-sm border text-indigo-600"><i class="fa-solid fa-chevron-left"></i></button>
                <h1 class="text-2xl font-black text-slate-800 uppercase italic">Report History</h1>
            </div>
            <div class="setup-card !p-4 bg-indigo-50/50 border-none">
                <input type="date" id="searchDateInput" class="large-input !text-sm !mb-2 !p-4">
                <select id="searchGroupFilter" class="large-input !text-sm !mb-2 !p-4"></select>
                <button id="searchHistoryBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg uppercase text-xs">সার্চ রিপোর্ট</button>
            </div>
            <div id="history-data" class="space-y-4"></div>
        </div>

        <div id="detail-section" class="app-page px-6 pt-8">
            <div class="flex justify-between items-center mb-6">
                <button onclick="window.showPage('history-section')" class="bg-white p-3 rounded-2xl shadow-sm border text-indigo-600"><i class="fa-solid fa-arrow-left"></i></button>
                <button id="downloadPdfBtn" class="bg-emerald-600 text-white px-6 py-4 rounded-2xl text-sm font-black uppercase shadow-lg"><i class="fa-solid fa-file-pdf mr-2"></i> PDF</button>
            </div>
            <div id="invoice-print" class="bg-white p-6 rounded-[2.5rem] border shadow-xl mb-6">
                <div class="text-center border-b-2 border-slate-50 pb-4 mb-4">
                    <h2 class="text-2xl font-black italic text-indigo-700 tracking-tighter">SHARIF PHARMA</h2>
                    <p id="inv-date" class="text-[9px] font-bold text-slate-400 uppercase mt-1"></p>
                </div>
                <div class="mb-4">
                    <p id="inv-chemist" class="text-xl font-black uppercase text-slate-800 italic"></p>
                </div>
                <table class="order-table">
                    <thead><tr><th>Medicine</th><th class="text-center">Qty</th><th class="no-pdf text-center">X</th></tr></thead>
                    <tbody id="inv-items-table-body"></tbody>
                </table>
            </div>
            <div class="setup-card border-l-8 border-orange-500">
                <input type="text" id="edit-p-name" list="med-list-data" placeholder="মেডিসিনের নাম..." class="large-input !text-sm">
                <input type="number" id="edit-p-qty" placeholder="পরিমাণ" class="large-input !text-sm">
                <button id="addItemToExistingBtn" class="save-btn bg-orange-500 font-black text-xs">আইটেম আপডেট করুন</button>
            </div>
        </div>

    </div>

    <datalist id="med-list-data"></datalist>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAzwqWUuMyW8piPhkFRhcpnmcpbu_0-lvk",
            authDomain: "sharif-pharma.firebaseapp.com",
            projectId: "sharif-pharma",
            storageBucket: "sharif-pharma.firebasestorage.app",
            messagingSenderId: "867521349666",
            appId: "1:867521349666:web:a8d139d5c41690e910227b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const DOC_REF = doc(db, "settings", "app_data");

        let masterData = { groups: [], customers: [], medicines: [] }, cart = [], currentGroup = '', currentChemist = '', currentOrderId = '', currentOrderData = null;

        // PWA Manifest Generation
        const manifest = {
            "name": "Sharif Pharma Admin",
            "short_name": "SharifPharma",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#f0f2f5",
            "theme_color": "#1e1b4b",
            "icons": [
                { "src": "https://via.placeholder.com/192/1e1b4b/ffffff?text=SP", "sizes": "192x192", "type": "image/png" },
                { "src": "https://via.placeholder.com/512/1e1b4b/ffffff?text=SP", "sizes": "512x512", "type": "image/png" }
            ]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        document.getElementById('pwa-manifest').setAttribute('href', URL.createObjectURL(blob));

        // Service Worker Registration for Offline Support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    self.addEventListener('install', e => {
                        e.waitUntil(caches.open('pwa-cache').then(cache => cache.addAll(['./'])));
                    });
                    self.addEventListener('fetch', e => {
                        e.respondWith(caches.match(e.request).then(response => response || fetch(e.request)));
                    });
                `;
                const blob = new Blob([swCode], {type: 'text/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            });
        }

        // --- Rest of your logic ---
        window.showPage = (id) => { 
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            window.scrollTo(0,0); 
        };
        window.toggleSection = (id) => document.getElementById(id).classList.toggle('hidden-section');

        onSnapshot(DOC_REF, (snap) => {
            masterData = snap.exists() ? snap.data() : { groups: [], customers: [], medicines: [] };
            renderAllUI();
        });

        function renderAllUI() {
            document.getElementById('main-group-list').innerHTML = (masterData.groups || []).map(g => `
                <button onclick="window.showChemists('${g}')" class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm text-center active:scale-95 transition-all">
                    <i class="fa-solid fa-folder text-indigo-500 text-3xl mb-3"></i>
                    <div class="font-black text-slate-700 text-[11px] uppercase">${g}</div>
                </button>
            `).join('');

            document.getElementById('gList').innerHTML = (masterData.groups || []).map(g => `<span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">${g} <i onclick="window.removeItem('groups', '${g}')" class="fa-solid fa-xmark ml-1 cursor-pointer"></i></span>`).join('');
            document.getElementById('cGroupSelect').innerHTML = '<option value="">Select Group First</option>' + (masterData.groups || []).map(g => `<option value="${g}">${g}</option>`).join('');
            document.getElementById('searchGroupFilter').innerHTML = '<option value="ALL">All Groups</option>' + (masterData.groups || []).map(g => `<option value="${g}">${g}</option>`).join('');
            document.getElementById('cSettingsGroupButtons').innerHTML = (masterData.groups || []).map(g => `<button onclick="window.viewCustomersByGroup('${g}')" class="bg-slate-100 text-slate-500 px-3 py-2 rounded-xl text-[10px] font-black uppercase active:bg-indigo-600 active:text-white transition-all">${g}</button>`).join('');
            document.getElementById('mListUI').innerHTML = (masterData.medicines || []).map(m => `<span class="bg-orange-50 text-orange-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">${m} <i onclick="window.removeItem('medicines', '${m}')" class="fa-solid fa-xmark ml-1 cursor-pointer"></i></span>`).join('');
            document.getElementById('med-list-data').innerHTML = (masterData.medicines || []).map(m => `<option value="${m}">`).join('');
        }

        window.viewCustomersByGroup = (g) => {
            const filtered = (masterData.customers || []).filter(c => c.group === g);
            document.getElementById('cSettingsListUI').innerHTML = filtered.length ? filtered.map(c => `<div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100 text-[11px] font-bold uppercase"><span>${c.name}</span><i onclick="window.removeCust('${c.name}', '${c.group}')" class="fa-solid fa-trash text-red-400 cursor-pointer p-1"></i></div>`).join('') : '<p class="text-center text-[10px] py-4 text-slate-400">খালি!</p>';
        };

        window.showChemists = (g) => {
            currentGroup = g; document.getElementById('group-title').innerText = g; window.showPage('chemist-section');
            const filtered = (masterData.customers || []).filter(c => c.group === g);
            const render = (list) => { document.getElementById('chemist-list').innerHTML = list.map(c => `<button onclick="window.openForm('${c.name}')" class="w-full text-left p-6 bg-white border border-slate-100 rounded-[2rem] font-black text-slate-700 shadow-sm uppercase active:scale-95 transition-all">${c.name}</button>`).join(''); };
            render(filtered);
            document.getElementById('custSearch').oninput = (e) => { render(filtered.filter(c => c.name.includes(e.target.value.toUpperCase()))); };
        };

        window.openForm = (name) => { currentChemist = name; cart = []; renderCart(); document.getElementById('selected-chemist-name').innerText = name; window.showPage('form-section'); };
        
        document.getElementById('addToCartBtn').onclick = () => {
            const pInput = document.getElementById('product-name');
            const qInput = document.getElementById('quantity');
            const p = pInput.value.toUpperCase();
            const q = qInput.value;
            if(p && q) { 
                cart.push({product: p, qty: q}); 
                pInput.value = ''; qInput.value = ''; 
                renderCart(); pInput.focus();
            }
        };

        function renderCart() { document.getElementById('cart-items').innerHTML = cart.map((item, i) => `<tr class="flex justify-between items-center p-5"><td class="font-bold text-lg uppercase">${item.product}</td><td class="font-black text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl text-lg">x${item.qty}</td><td><button onclick="window.removeCartItem(${i})" class="text-red-400 p-2">✕</button></td></tr>`).join(''); }
        window.removeCartItem = (i) => { cart.splice(i,1); renderCart(); };

        document.getElementById('saveOrderBtn').onclick = async () => {
            if(!cart.length) return;
            const date = new Intl.DateTimeFormat('en-CA', {timeZone:'Asia/Dhaka'}).format(new Date());
            await addDoc(collection(db, "orders"), { group: currentGroup, chemist: currentChemist, items: cart, date: date, timestamp: new Date().getTime() });
            alert("অর্ডার সেভ হয়েছে!"); 
            window.showPage('chemist-section');
        };

        document.getElementById('searchHistoryBtn').onclick = async () => {
            const dateInput = document.getElementById('searchDateInput').value;
            const groupFilter = document.getElementById('searchGroupFilter').value;
            if(!dateInput) return alert("তারিখ সিলেক্ট করুন");
            const container = document.getElementById('history-data');
            container.innerHTML = '<p class="text-center text-slate-400 py-10 font-bold">সার্চ হচ্ছে...</p>';
            try {
                const q = query(collection(db, "orders"), where("date", "==", dateInput));
                const snap = await getDocs(q);
                let results = [];
                snap.forEach(d => {
                    const data = d.data();
                    if(groupFilter === "ALL" || data.group === groupFilter) results.push({ id: d.id, ...data });
                });
                results.sort((a, b) => b.timestamp - a.timestamp);
                if(results.length === 0) {
                    container.innerHTML = '<p class="text-center text-red-400 py-10 font-bold italic">কোনো অর্ডার পাওয়া যায়নি!</p>';
                    return;
                }
                container.innerHTML = results.map(data => `
                    <div onclick="window.openDetail('${data.id}')" class="setup-card flex justify-between items-center cursor-pointer !p-6 border-l-8 border-indigo-600 active:scale-95 transition-all">
                        <div>
                            <p class="font-black text-slate-800 uppercase text-lg italic leading-tight">${data.chemist}</p>
                            <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">${data.group} • ${data.items.length} Items</p>
                        </div>
                        <i class="fa-solid fa-chevron-right text-slate-300"></i>
                    </div>
                `).join('');
            } catch (err) { container.innerHTML = '<p class="text-center text-red-500 py-10">সার্চে ভুল হয়েছে।</p>'; }
        };

        window.openDetail = (id) => {
            currentOrderId = id;
            onSnapshot(doc(db, "orders", id), (snap) => {
                if(!snap.exists()) return;
                currentOrderData = snap.data();
                document.getElementById('inv-date').innerText = currentOrderData.date;
                document.getElementById('inv-chemist').innerText = currentOrderData.chemist;
                document.getElementById('inv-items-table-body').innerHTML = (currentOrderData.items || []).map((it, i) => `<tr><td class="uppercase text-[12px]">${it.product}</td><td class="text-center font-black text-indigo-600">x${it.qty}</td><td class="no-pdf text-center"><button onclick="window.deleteItemFromOrder(${i})" class="text-red-300"><i class="fa-solid fa-trash-can"></i></button></td></tr>`).join('');
                window.showPage('detail-section');
            });
        };

        document.getElementById('addItemToExistingBtn').onclick = async () => {
            const pInput = document.getElementById('edit-p-name');
            const qInput = document.getElementById('edit-p-qty');
            const p = pInput.value.toUpperCase();
            const q = qInput.value;
            if(p && q) {
                await updateDoc(doc(db, "orders", currentOrderId), { items: [...(currentOrderData.items || []), { product: p, qty: q }] });
                pInput.value = ''; qInput.value = ''; pInput.focus();
            }
        };

        window.deleteItemFromOrder = async (i) => { if(confirm("Delete?")) await updateDoc(doc(db, "orders", currentOrderId), { items: currentOrderData.items.filter((_, idx) => idx !== i) }); };

        document.getElementById('downloadPdfBtn').onclick = () => {
            const el = document.getElementById('invoice-print');
            const noPdf = document.querySelectorAll('.no-pdf'); noPdf.forEach(x => x.style.display = 'none');
            html2pdf().set({ margin: 10, filename: `${currentOrderData.chemist}.pdf`, html2canvas: { scale: 3 }, jsPDF: { format: 'a4' } }).from(el).save().then(() => noPdf.forEach(x => x.style.display = 'table-cell'));
        };

        document.getElementById('addGroupBtn').onclick = async () => {
            const v = document.getElementById('gInput').value.trim().toUpperCase();
            if(v) {
                if(!(masterData.groups || []).includes(v)) await updateDoc(DOC_REF, { groups: arrayUnion(v) });
                document.getElementById('gInput').value = '';
            }
        };

        document.getElementById('saveMedBtn').onclick = async () => {
            const meds = document.getElementById('mInputBulk').value.split(/[,\n]/).map(m => m.trim().toUpperCase()).filter(m => m);
            if(meds.length) {
                await updateDoc(DOC_REF, { medicines: arrayUnion(...meds) });
                document.getElementById('mInputBulk').value = ''; alert("ওষুধ সেভ হয়েছে!");
            }
        };

        document.getElementById('saveCustBtn').onclick = async () => {
            const grp = document.getElementById('cGroupSelect').value, txt = document.getElementById('cInputBulk').value.split(/[,\n]/).map(n => n.trim().toUpperCase()).filter(n => n);
            if(grp && txt.length) {
                const combined = [...(masterData.customers || []), ...txt.map(n => ({name: n, group: grp}))];
                const unique = combined.filter((v,i,a) => a.findIndex(t => t.name === v.name && t.group === v.group) === i);
                await updateDoc(DOC_REF, { customers: unique });
                document.getElementById('cInputBulk').value = ''; alert("কাস্টমার সেভ হয়েছে!");
            }
        };

        window.removeItem = async (k, v) => { if(confirm("ডিলিট করবেন?")) await updateDoc(DOC_REF, { [k]: arrayRemove(v) }); };
        window.removeCust = async (n, g) => { if(confirm("ডিলিট করবেন?")) await updateDoc(DOC_REF, { customers: (masterData.customers || []).filter(c => !(c.name === n && c.group === g)) }); };

    </script>
</body>
</html>
